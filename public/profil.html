<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon compte — Kiosque Al Kass</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { background:#1b1712; color:#f2e9dd; font-family:'IBM Plex Sans',sans-serif; margin:0; padding:24px 18px 60px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  a.retour { color:#a99d8c; font-size:13px; text-decoration:none; }
  h1 { font-family:'Fraunces',serif; font-weight:900; font-size:28px; margin:10px 0 18px; }

  /* --- Connexion --- */
  .carte-connexion {
    background:#241f19; border:1px solid #3a332a; border-radius:14px; padding:22px;
  }
  .carte-connexion label { display:block; font-size:12.5px; color:#a99d8c; margin-bottom:6px; }
  .carte-connexion input {
    width:100%; padding:12px 14px; border-radius:8px; border:1px solid #3a332a;
    background:#2c261e; color:#f2e9dd; font-family:'IBM Plex Mono',monospace; font-size:15px; margin-bottom:14px;
  }
  .carte-connexion button {
    width:100%; padding:13px; border-radius:10px; border:none; background:#c1421a; color:#fff;
    font-family:'Fraunces',serif; font-weight:700; font-size:15px; cursor:pointer;
  }
  .carte-connexion button:disabled { background:#6b6154; cursor:not-allowed; }
  .etape2 { display:none; }
  .msg { font-size:13px; text-align:center; margin-top:12px; min-height:16px; }
  .msg.erreur { color:#d97757; }
  .msg.ok { color:#6a9a4f; }
  .retour-etape { text-align:center; margin-top:12px; font-size:12px; color:#a99d8c; cursor:pointer; text-decoration:underline; }

  /* --- Profil --- */
  #zoneProfil { display:none; }
  .top { display:flex; justify-content:space-between; align-items:center; }
  .deconnexion { font-size:12.5px; color:#a99d8c; cursor:pointer; text-decoration:underline; background:none; border:none; }

  .carte-rang {
    background: linear-gradient(135deg, #c1421a, #a83714);
    border-radius: 14px; padding: 20px; margin: 18px 0; text-align:center; display:none;
  }
  .carte-rang .pos { font-family:'Fraunces',serif; font-weight:900; font-size:40px; color:#fff; }
  .carte-rang .label { font-size:12.5px; color:rgba(255,255,255,0.85); }
  .carte-rang .detail { font-family:'IBM Plex Mono',monospace; font-size:13px; color:#fff; margin-top:8px; }

  .section-titre { font-family:'Fraunces',serif; font-weight:700; font-size:19px; margin:20px 0 10px; }
  .commande { background:#241f19; border:1px solid #3a332a; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .commande .date { font-size:11.5px; color:#a99d8c; font-family:'IBM Plex Mono',monospace; }
  .commande .items { font-size:13.5px; margin:6px 0; }
  .commande .total { font-family:'IBM Plex Mono',monospace; color:#e8a93b; font-weight:600; }
  .vide { text-align:center; color:#a99d8c; padding:30px 0; font-size:13.5px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="retour" href="/">← Retour</a>

  <div id="zoneConnexion">
    <h1>👤 Mon compte</h1>
    <div class="carte-connexion">
      <div id="etapeTel">
        <label for="telephone">Votre numéro de téléphone (WhatsApp)</label>
        <input type="tel" id="telephone" placeholder="Ex : 0700000000">
        <button id="btnEnvoyer" onclick="envoyerCode()">Recevoir le code</button>
      </div>
      <div class="etape2" id="etapeCode">
        <label for="code">Code reçu par WhatsApp</label>
        <input type="text" id="code" placeholder="000000" maxlength="6">
        <button id="btnVerifier" onclick="verifierCode()">Se connecter</button>
        <div class="retour-etape" onclick="retourEtape()">← Changer de numéro</div>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div id="zoneProfil">
    <div class="top">
      <h1>👤 Mon compte</h1>
      <button class="deconnexion" onclick="deconnexion()">Se déconnecter</button>
    </div>

    <div class="carte-rang" id="carteRang">
      <div class="label">Votre position cette semaine</div>
      <div class="pos" id="position">—</div>
      <div class="detail" id="detailRang"></div>
    </div>

    <div class="section-titre">Historique de commandes</div>
    <div id="historique"></div>
  </div>
</div>

<script>
let telephoneActuel = "";

function afficherMsg(texte, type) {
  const m = document.getElementById('msg');
  m.textContent = texte;
  m.className = 'msg ' + (type || '');
}

async function envoyerCode() {
  const telephone = document.getElementById('telephone').value.trim();
  if (!telephone) { afficherMsg('Entrez votre numéro.', 'erreur'); return; }

  const btn = document.getElementById('btnEnvoyer');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';

  try {
    const res = await fetch('/client/connexion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telephone })
    });
    if (res.ok) {
      telephoneActuel = telephone;
      document.getElementById('etapeTel').style.display = 'none';
      document.getElementById('etapeCode').style.display = 'block';
      afficherMsg('Code envoyé par WhatsApp ✅', 'ok');
    } else {
      const data = await res.json();
      afficherMsg(data.erreur || 'Erreur.', 'erreur');
    }
  } catch (e) {
    afficherMsg('Connexion impossible.', 'erreur');
  }

  btn.disabled = false;
  btn.textContent = 'Recevoir le code';
}

async function verifierCode() {
  const code = document.getElementById('code').value.trim();
  if (!code) { afficherMsg('Entrez le code reçu.', 'erreur'); return; }

  const btn = document.getElementById('btnVerifier');
  btn.disabled = true;
  btn.textContent = 'Vérification...';

  try {
    const res = await fetch('/client/verifier', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telephone: telephoneActuel, code })
    });
    if (res.ok) {
      afficherProfil();
    } else {
      const data = await res.json();
      afficherMsg(data.erreur || 'Code invalide.', 'erreur');
    }
  } catch (e) {
    afficherMsg('Connexion impossible.', 'erreur');
  }

  btn.disabled = false;
  btn.textContent = 'Se connecter';
}

function retourEtape() {
  document.getElementById('etapeTel').style.display = 'block';
  document.getElementById('etapeCode').style.display = 'none';
  afficherMsg('', '');
}

async function afficherProfil() {
  const res = await fetch('/api/mon-profil');
  if (!res.ok) {
    document.getElementById('zoneConnexion').style.display = 'block';
    document.getElementById('zoneProfil').style.display = 'none';
    return;
  }
  const data = await res.json();

  document.getElementById('zoneConnexion').style.display = 'none';
  document.getElementById('zoneProfil').style.display = 'block';

  const carte = document.getElementById('carteRang');
  if (data.classementSemaine) {
    carte.style.display = 'block';
    document.getElementById('position').textContent = '#' + data.classementSemaine.position;
    document.getElementById('detailRang').textContent =
      data.classementSemaine.spaghettis + ' spaghetti(s) — ' + data.classementSemaine.totalDepense + ' FCFA cette semaine';
  } else {
    carte.style.display = 'none';
  }

  const hist = document.getElementById('historique');
  if (!data.commandes || data.commandes.length === 0) {
    hist.innerHTML = '<div class="vide">Aucune commande pour le moment.</div>';
    return;
  }

  hist.innerHTML = data.commandes.map(c => {
    const d = new Date(c.date);
    const dateTexte = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    const items = c.items.map(i => `${i.quantite}x ${i.produit}${i.oeuf ? ' (œuf ' + i.oeuf + ')' : ''}`).join(', ');
    return `<div class="commande"><div class="date">${dateTexte}</div><div class="items">${items}</div><div class="total">${c.total} FCFA</div></div>`;
  }).join('');
}

async function deconnexion() {
  await fetch('/client/deconnexion', { method: 'POST' });
  document.getElementById('zoneConnexion').style.display = 'block';
  document.getElementById('zoneProfil').style.display = 'none';
  document.getElementById('etapeTel').style.display = 'block';
  document.getElementById('etapeCode').style.display = 'none';
  document.getElementById('telephone').value = '';
  document.getElementById('code').value = '';
}

// Vérifie si déjà connecté au chargement
(async () => {
  const res = await fetch('/api/mon-profil');
  if (res.ok) afficherProfil();
})();
</script>
</body>
</html>
