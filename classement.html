<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement de la semaine — Kiosque Al Kass</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { background:#1b1712; color:#f2e9dd; font-family:'IBM Plex Sans',sans-serif; margin:0; padding:24px 18px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 { font-family:'Fraunces',serif; font-weight:900; font-size:28px; margin-bottom:4px; }
  .semaine { font-family:'IBM Plex Mono',monospace; color:#e8a93b; font-size:13px; margin-bottom:24px; }
  .ligne {
    display:flex; align-items:center; gap:14px;
    background:#241f19; border:1px solid #3a332a; border-radius:12px;
    padding:14px 16px; margin-bottom:10px;
  }
  .rang { font-family:'Fraunces',serif; font-weight:900; font-size:22px; color:#c1421a; width:28px; }
  .ligne:first-child .rang { color:#e8a93b; }
  .infos { flex:1; }
  .nom { font-weight:600; }
  .tel { font-size:12px; color:#a99d8c; }
  .stats { text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .stats b { color:#e8a93b; }
  .vide { text-align:center; color:#a99d8c; padding:40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏆 Classement</h1>
  <div class="semaine" id="semaine">Chargement...</div>
  <div id="liste"></div>
</div>
<script>
fetch('/api/classement').then(r => r.json()).then(data => {
  document.getElementById('semaine').textContent = 'Semaine ' + data.semaine;
  const liste = document.getElementById('liste');
  if (data.classement.length === 0) {
    liste.innerHTML = '<div class="vide">Aucune commande cette semaine.</div>';
    return;
  }
  liste.innerHTML = data.classement.map((c, i) => `
    <div class="ligne">
      <div class="rang">${i + 1}</div>
      <div class="infos">
        <div class="nom">${c.nom}</div>
        <div class="tel">${c.telephone}</div>
      </div>
      <div class="stats">${c.spaghettis} spaghetti(s)<br><b>${c.totalDepense} FCFA</b></div>
    </div>
  `).join('');
});
</script>
</body>
</html>
